name: Expo CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_apk:
        description: Build installable Android APK
        required: false
        default: true
        type: boolean

concurrency:
  group: expo-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint and Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  deploy_expo_update:
    name: Deploy Expo Update
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update to Expo
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx eas update --branch production --message "CI deploy ${GITHUB_SHA::7}" --non-interactive

  build_android_apk:
    name: Build Android APK (EAS Preview)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_apk)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger Android preview build
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx eas build --platform android --profile preview --non-interactive --wait

      - name: Capture latest Android build URL
        working-directory: apps/mobile
        run: |
          npx eas build:list --platform android --limit 1 --json --non-interactive > latest-build.json
          node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync('latest-build.json','utf8'));const build=Array.isArray(data)?data[0]:data;const details=build?.id?`https://expo.dev/accounts/${build.accountName}/projects/${build.project.name}/builds/${build.id}`:'';fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `### Android APK Build\n- Status: ${build?.status ?? 'unknown'}\n- Details: ${details || 'n/a'}\n`);"

